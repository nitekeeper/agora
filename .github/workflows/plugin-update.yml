name: Plugin update (push-triggered)

# Dispatched by individual plugin repos when they publish a new release.
# See docs/automation.md for the plugin-side workflow template + PAT setup.
#
# Payload:
#   client_payload.plugin     — plugin name (e.g. "memex") -- REQUIRED
#   client_payload.tag        — the just-published tag (e.g. "v2.3.0") -- optional
#
# This workflow runs `scripts/update.py <plugin>`, commits the diff if
# anything changed, and pushes the bump as a PR. The PR runs through the
# same CI gates a human-opened PR would.

on:
  repository_dispatch:
    types: [plugin-released]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump pinned version
    runs-on: ubuntu-latest
    steps:
      - name: Validate payload
        run: |
          plugin='${{ github.event.client_payload.plugin }}'
          if [ -z "$plugin" ]; then
            echo "::error::client_payload.plugin is required"
            exit 1
          fi
          # Basic safety: plugin name must look like a registered plugin id.
          # Whitelist [a-z][a-z0-9-]* — matches what agora's naming rules allow.
          if ! echo "$plugin" | grep -qE '^[a-z][a-z0-9-]*$'; then
            echo "::error::invalid plugin name: $plugin"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git auth for private plugin repos
        # scripts/update.py invokes `git ls-remote` against the plugin's repo
        # URL. Bare https://github.com/... URLs fail with "Repository not
        # found" on private repos when authenticated as agora's GITHUB_TOKEN
        # (which has no access to the plugin repos).
        #
        # Replace the extraheader actions/checkout configured with one that
        # uses PLUGIN_REPOS_READ_TOKEN — a fine-grained PAT covering the
        # private plugin repos. Earlier attempts using url.insteadOf alongside
        # the existing extraheader lost the auth-precedence fight: git sent
        # both credentials and GitHub used whichever-came-first, which was
        # agora's token. Swapping the extraheader value directly removes that
        # ambiguity — there's exactly one Authorization header git can send
        # for github.com URLs, and it's our PAT.
        env:
          PLUGIN_TOKEN: ${{ secrets.PLUGIN_REPOS_READ_TOKEN }}
        run: |
          if [ -z "$PLUGIN_TOKEN" ]; then
            echo "::warning::PLUGIN_REPOS_READ_TOKEN secret not set — ls-remote will use anonymous access. Private plugin repos will fail."
          else
            auth=$(printf 'x-access-token:%s' "$PLUGIN_TOKEN" | base64 -w0)
            # --replace-all overwrites any existing value at this key (the one
            # actions/checkout wrote with agora's GITHUB_TOKEN).
            git config --local --replace-all http.https://github.com/.extraheader "AUTHORIZATION: basic $auth"
            # Diagnostic: show that the extraheader is set (value redacted).
            echo "Configured http.https://github.com/.extraheader with PAT-based basic auth."
          fi

      - name: Run scripts/update.py
        id: update
        env:
          # update.py also talks to the GitHub REST API (description fetch, tag
          # SHA resolution). Same PAT — it carries Contents+Metadata read on the
          # plugin repos. Falls back to default GITHUB_TOKEN if the PAT isn't
          # configured yet (public-only plugin set, or pre-Option-B setup).
          GITHUB_TOKEN: ${{ secrets.PLUGIN_REPOS_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          plugin='${{ github.event.client_payload.plugin }}'
          python scripts/update.py "$plugin"
          if [ -n "$(git status --porcelain plugins.json .claude-plugin/marketplace.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change for $plugin; nothing to PR."
          fi

      - name: Open PR with the bump
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          plugin='${{ github.event.client_payload.plugin }}'
          tag='${{ github.event.client_payload.tag }}'
          branch="auto-update/${plugin}-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add plugins.json .claude-plugin/marketplace.json
          if [ -n "$tag" ]; then
            git commit -m "auto-update: bump $plugin to $tag"
            title="auto-update: bump $plugin to $tag"
          else
            git commit -m "auto-update: bump $plugin"
            title="auto-update: bump $plugin"
          fi
          git push -u origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body "Automated bump triggered by ${plugin}'s release workflow via repository_dispatch (plugin-released event). See .github/workflows/plugin-update.yml."
