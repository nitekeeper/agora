name: Plugin update (push-triggered)

# Dispatched by individual plugin repos when they publish a new release.
# See docs/automation.md for the plugin-side workflow template + dispatch
# token setup.
#
# Payload:
#   client_payload.plugin     — plugin name (e.g. "memex") -- REQUIRED
#   client_payload.tag        — the just-published tag (e.g. "v2.3.0") -- optional
#
# This workflow runs `scripts/update.py <plugin>`, commits the diff if
# anything changed, and pushes the bump as a PR. The PR runs through the
# same CI gates a human-opened PR would.

on:
  repository_dispatch:
    types: [plugin-released]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump pinned version
    runs-on: ubuntu-latest
    steps:
      - name: Validate payload
        env:
          # Pass client_payload values via env, never inline-interpolate them
          # into a `run:` script. Inline interpolation happens before bash
          # sees the script, so a malicious dispatch payload could break out
          # of single quotes and inject arbitrary commands. Env-var passing
          # routes the value through process environment, where bash can
          # never re-parse it as code.
          PLUGIN: ${{ github.event.client_payload.plugin }}
        run: |
          if [ -z "$PLUGIN" ]; then
            echo "::error::client_payload.plugin is required"
            exit 1
          fi
          # Basic safety: plugin name must look like a registered plugin id.
          # Whitelist [a-z][a-z0-9-]* — matches what agora's naming rules allow.
          if ! echo "$PLUGIN" | grep -qE '^[a-z][a-z0-9-]*$'; then
            echo "::error::invalid plugin name: $PLUGIN"
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          # Default persist-credentials: true keeps checkout's GITHUB_TOKEN
          # credential in .git/config so the final `git push` to agora
          # authenticates natively. Plugin repos are public, so the
          # `git ls-remote` reads in scripts/update.py need no auth.

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scripts/update.py
        id: update
        env:
          # update.py resolves the latest tag and its SHA entirely via
          # `git ls-remote` (git_helpers.ls_remote_tags) — no GitHub REST
          # calls, no token needed. The now-public plugin repos read
          # anonymously.
          # client_payload.plugin via env — see "Validate payload" step for
          # the no-inline-interpolation rationale.
          PLUGIN: ${{ github.event.client_payload.plugin }}
        run: |
          python3 scripts/update.py "$PLUGIN"
          if [ -n "$(git status --porcelain plugins.json .claude-plugin/marketplace.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change for $PLUGIN; nothing to PR."
          fi

      - name: Open PR with the bump
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # client_payload values via env — see "Validate payload" step for
          # the no-inline-interpolation rationale. Both PLUGIN and TAG are
          # client-controlled; only PLUGIN is regex-validated upstream, so
          # TAG must not be interpolated as code under any circumstances.
          PLUGIN: ${{ github.event.client_payload.plugin }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          # Re-validate TAG as a defense-in-depth measure (the upstream
          # validate step only checks PLUGIN). A real GitHub tag looks like
          # v1.2.3, possibly with a -pre.1 suffix; lock it to that shape
          # before letting it near a shell or git command.
          if [ -n "$TAG" ] && ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "::error::invalid tag: $TAG"
            exit 1
          fi
          branch="auto-update/${PLUGIN}-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add plugins.json .claude-plugin/marketplace.json
          if [ -n "$TAG" ]; then
            git commit -m "auto-update: bump $PLUGIN to $TAG"
            title="auto-update: bump $PLUGIN to $TAG"
          else
            git commit -m "auto-update: bump $PLUGIN"
            title="auto-update: bump $PLUGIN"
          fi
          git push -u origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body "Automated bump triggered by ${PLUGIN}'s release workflow via repository_dispatch (plugin-released event). See .github/workflows/plugin-update.yml."
          # Queue the PR for auto-merge so it self-merges once the required CI
          # checks pass — no human in the loop for routine version bumps. This
          # requires repo `allow_auto_merge` + branch protection on main (both
          # configured at the repo level, not here). Made non-fatal: the PR is
          # already created above, so a transient failure to enable auto-merge
          # must not fail the job and lose the bump — it just falls back to
          # manual merge.
          gh pr merge "$branch" --auto --squash --delete-branch \
            || echo "::warning::could not enable auto-merge; PR is open for manual merge"
