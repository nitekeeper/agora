name: Auto-update health

# Safety-net watcher for the plugin-update.yml auto-merge pipeline.
#
# Healthy path: plugin-update.yml opens an `auto-update/**` PR and enables
# auto-merge (`gh pr merge --auto`). CI runs, passes, and the PR squash-merges
# within minutes — no human in the loop.
#
# Failure mode this guards: if a bot PR's required checks ever fail to *run*
# (they park as `action_required` instead of starting), `--auto` enables but
# never has a passing check to act on. The PR then hangs OPEN indefinitely
# with no signal — nobody is watching an automated bump.
#
# This workflow runs daily, finds open `auto-update/**` PRs older than
# STALE_HOURS, and surfaces them through a single deduplicated tracking ISSUE
# (created once, refreshed via comments on subsequent runs, closed when the
# backlog clears). It never fails the job on "found stale PRs" — the issue is
# the signal; the job only fails on a real script error.

on:
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  flag-stale:
    name: Flag stale auto-update PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Detect stale auto-update PRs and update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys
          from datetime import datetime, timezone

          # --- Tunables -------------------------------------------------------
          STALE_HOURS = 6
          BRANCH_PREFIX = "auto-update/"
          MARKER_TITLE = "Stuck auto-update PR(s) — not auto-merging"
          REMEDIATION = (
              "likely parked required checks — re-run the PR's CI or merge "
              "manually"
          )

          repo = os.environ["GITHUB_REPOSITORY"]


          def gh(*args, check=True):
              """Run a gh command and return stdout (text)."""
              result = subprocess.run(
                  ["gh", *args],
                  capture_output=True,
                  text=True,
              )
              if check and result.returncode != 0:
                  sys.stderr.write(result.stdout)
                  sys.stderr.write(result.stderr)
                  raise SystemExit(
                      f"gh {' '.join(args)} failed (exit {result.returncode})"
                  )
              return result.stdout


          def parse_ts(value):
              """Parse a GitHub ISO-8601 timestamp (e.g. 2026-06-19T07:17:00Z)."""
              return datetime.fromisoformat(value.replace("Z", "+00:00"))


          now = datetime.now(timezone.utc)

          # --- Collect open PRs ----------------------------------------------
          pulls_raw = gh(
              "api", f"repos/{repo}/pulls?state=open&per_page=100"
          )
          pulls = json.loads(pulls_raw) if pulls_raw.strip() else []
          if not isinstance(pulls, list):
              pulls = []

          stale = []
          for pr in pulls:
              head = (pr.get("head") or {}).get("ref") or ""
              if not head.startswith(BRANCH_PREFIX):
                  continue
              created = pr.get("created_at")
              if not created:
                  continue
              age_hours = (now - parse_ts(created)).total_seconds() / 3600.0
              if age_hours > STALE_HOURS:
                  stale.append(
                      {
                          "number": pr.get("number"),
                          "url": pr.get("html_url"),
                          "age_hours": age_hours,
                          "branch": head,
                      }
                  )

          stale.sort(key=lambda p: p["age_hours"], reverse=True)

          # --- Find an existing open marker issue ----------------------------
          # The issues endpoint returns PRs too; skip any entry that carries a
          # `pull_request` key so we only ever match a real issue.
          issues_raw = gh(
              "api", f"repos/{repo}/issues?state=open&per_page=100"
          )
          issues = json.loads(issues_raw) if issues_raw.strip() else []
          if not isinstance(issues, list):
              issues = []

          marker_issue = None
          for issue in issues:
              if "pull_request" in issue:
                  continue
              if issue.get("title") == MARKER_TITLE:
                  marker_issue = issue
                  break

          # --- Build the report body -----------------------------------------
          def render_body():
              lines = [
                  "The following open `auto-update/**` PR(s) are older than "
                  f"{STALE_HOURS}h and have not auto-merged:",
                  "",
              ]
              for p in stale:
                  lines.append(
                      f"- PR #{p['number']} ({p['branch']}) — "
                      f"{p['age_hours']:.1f}h old — {p['url']}"
                  )
              lines.append("")
              lines.append(f"Remediation: {REMEDIATION}.")
              lines.append("")
              lines.append(
                  "_Filed automatically by "
                  "`.github/workflows/auto-update-health.yml`._"
              )
              return "\n".join(lines)

          # --- Act ------------------------------------------------------------
          if stale:
              body = render_body()
              if marker_issue is None:
                  out = gh(
                      "issue",
                      "create",
                      "--title",
                      MARKER_TITLE,
                      "--body",
                      body,
                  )
                  print(
                      f"Opened tracking issue for {len(stale)} stale PR(s): "
                      f"{out.strip()}"
                  )
              else:
                  num = marker_issue["number"]
                  gh(
                      "issue",
                      "comment",
                      str(num),
                      "--body",
                      body,
                  )
                  print(
                      f"Refreshed tracking issue #{num} with {len(stale)} "
                      "stale PR(s)."
                  )
          else:
              if marker_issue is not None:
                  num = marker_issue["number"]
                  gh(
                      "issue",
                      "close",
                      str(num),
                      "--comment",
                      "Resolved: no stale auto-update PRs.",
                  )
                  print(
                      f"Closed tracking issue #{num}: backlog clear."
                  )
              else:
                  print("No stale auto-update PRs; nothing to flag.")
          PY
